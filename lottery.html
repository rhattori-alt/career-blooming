<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>席番号くじ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Playfair+Display:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fff0f6 0%, #f0f4ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif JP', serif;
    color: #2d2d2d;
    padding: 24px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    letter-spacing: 0.15em;
    color: #e0407a;
    margin-bottom: 32px;
    text-align: center;
  }

  .setup {
    background: white;
    border: 2px solid #ffd6e8;
    border-radius: 20px;
    padding: 28px 32px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 4px 24px rgba(224,64,122,0.1);
    margin-bottom: 32px;
  }

  .setup label {
    display: block;
    font-size: 0.85rem;
    color: #e0407a;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .setup-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .setup input {
    width: 80px;
    padding: 10px 14px;
    border: 2px solid #ffd6e8;
    border-radius: 8px;
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    color: #2d2d2d;
    background: #fff8fb;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .setup input:focus {
    border-color: #e0407a;
  }

  .setup-hint {
    font-size: 0.78rem;
    color: #f48cb0;
  }

  .btn-start {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #ff6fab, #e0407a);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
    box-shadow: 0 4px 16px rgba(224,64,122,0.3);
  }

  .btn-start:hover { opacity: 0.88; }
  .btn-start:active { transform: scale(0.98); }

  /* Main lottery UI */
  .lottery {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 360px;
  }

  .progress {
    font-size: 0.85rem;
    color: #f48cb0;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .number-display {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 4px solid #ffd6e8;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    color: #e0407a;
    box-shadow: 0 8px 32px rgba(224,64,122,0.15);
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }

  .number-display.pop {
    animation: pop 0.35s ease-out;
  }

  @keyframes pop {
    0%   { transform: scale(0.7); opacity: 0.4; }
    60%  { transform: scale(1.08); }
    100% { transform: scale(1);   opacity: 1; }
  }

  .number-display .placeholder {
    font-size: 1.1rem;
    color: #f8b8d0;
    font-family: 'Noto Serif JP', serif;
    letter-spacing: 0.1em;
  }

  .btn-draw {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #ffb347, #ff6f61);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(255,111,97,0.3);
    margin-bottom: 16px;
  }

  .btn-draw:hover { opacity: 0.88; }
  .btn-draw:active { transform: scale(0.98); }
  .btn-draw:disabled {
    background: #f8c8d8;
    cursor: not-allowed;
    box-shadow: none;
  }

  .used-numbers {
    width: 100%;
    background: white;
    border: 2px solid #ffd6e8;
    border-radius: 14px;
    padding: 16px 20px;
    margin-top: 8px;
  }

  .used-title {
    font-size: 0.78rem;
    color: #f48cb0;
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }

  .used-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .used-chip {
    background: #fff0f6;
    color: #e0407a;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.85rem;
    font-family: 'Playfair Display', serif;
  }

  .btn-reset {
    margin-top: 20px;
    background: none;
    border: 2px solid #ffd6e8;
    color: #f48cb0;
    padding: 10px 24px;
    border-radius: 8px;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-reset:hover { border-color: #e0407a; color: #e0407a; }

  .done-msg {
    color: #e0407a;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    margin-top: 8px;
    display: none;
  }
</style>
</head>
<body>

<h1>席番号くじ</h1>

<!-- Setup screen -->
<div class="setup" id="setupScreen">
  <label>参加者の人数</label>
  <div class="setup-row">
    <input type="number" id="totalInput" min="1" max="100" value="30" />
    <span class="setup-hint">名（1〜100）</span>
  </div>
  <button class="btn-start" onclick="startLottery()">くじを始める</button>
</div>

<!-- Lottery screen -->
<div class="lottery" id="lotteryScreen">
  <div class="progress" id="progressText"></div>

  <div class="number-display" id="display">
    <span class="placeholder">くじを引く</span>
  </div>

  <button class="btn-draw" id="drawBtn" onclick="draw()">引く</button>
  <div class="done-msg" id="doneMsg">全員の番号が決まりました 🎉</div>

  <div class="used-numbers" id="usedBox" style="display:none">
    <div class="used-title">引いた番号</div>
    <div class="used-grid" id="usedGrid"></div>
  </div>

  <button class="btn-reset" onclick="reset()">最初からやり直す</button>
</div>

<script>
  let remaining = [];
  let used = [];
  let total = 30;

  function startLottery() {
    const val = parseInt(document.getElementById('totalInput').value);
    if (!val || val < 1 || val > 100) {
      alert('1〜100の人数を入力してください');
      return;
    }
    total = val;
    remaining = Array.from({length: total}, (_, i) => i + 1);
    used = [];
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('lotteryScreen').style.display = 'flex';
    updateProgress();
  }

  function draw() {
    if (remaining.length === 0) return;

    const idx = Math.floor(Math.random() * remaining.length);
    const num = remaining.splice(idx, 1)[0];

    const display = document.getElementById('display');
    const drawBtn = document.getElementById('drawBtn');
    drawBtn.disabled = true;

    // Rolling animation: fast → slow over ~3 seconds
    const duration = 3000;
    const start = Date.now();
    let interval = 60;
    let timer;

    function roll() {
      const elapsed = Date.now() - start;
      const progress = elapsed / duration;

      if (progress >= 1) {
        // Show final number
        used.push(num);
        display.innerHTML = num;
        display.classList.remove('pop');
        void display.offsetWidth;
        display.classList.add('pop');
        updateProgress();
        updateUsed();
        if (remaining.length === 0) {
          document.getElementById('doneMsg').style.display = 'block';
        } else {
          drawBtn.disabled = false;
        }
        return;
      }

      // Show a random number from full pool as decoy
      const decoy = Math.floor(Math.random() * total) + 1;
      display.innerHTML = decoy;

      // Gradually slow down: interval grows from 60ms to 300ms
      interval = 60 + Math.floor(progress * progress * 240);
      timer = setTimeout(roll, interval);
    }

    roll();
  }

  function updateProgress() {
    document.getElementById('progressText').textContent =
      `${used.length} / ${total} 名`;
  }

  function updateUsed() {
    const grid = document.getElementById('usedGrid');
    const box = document.getElementById('usedBox');
    box.style.display = 'block';
    grid.innerHTML = used.map(n =>
      `<span class="used-chip">${n}</span>`
    ).join('');
  }

  function reset() {
    document.getElementById('setupScreen').style.display = 'block';
    document.getElementById('lotteryScreen').style.display = 'none';
    document.getElementById('display').innerHTML = '<span class="placeholder">くじを引く</span>';
    document.getElementById('drawBtn').disabled = false;
    document.getElementById('doneMsg').style.display = 'none';
    document.getElementById('usedBox').style.display = 'none';
    document.getElementById('usedGrid').innerHTML = '';
  }
</script>
</body>
</html>
